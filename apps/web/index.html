              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Nossa IA analisa a foto clínica detectando múltiplos dentes, classificando o tipo de tratamento indicado (resina, porcelana, coroa, implante, etc.), identificando a cor VITA e gerando um protocolo personalizado baseado no seu inventário de resinas."
              }
            },
            {
              "@type": "Question",
              "name": "O que é a simulação DSD?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "O Digital Smile Design (DSD) analisa proporções faciais e dentais, permitindo simular diferentes níveis de clareamento (Natural, White, Hollywood) para que você e seu paciente visualizem o resultado antes de iniciar o tratamento."
              }
            },
            {
              "@type": "Question",
              "name": "Quais tipos de tratamento são suportados?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "A plataforma suporta 6 tipos de tratamento: Resina Composta (com protocolo de estratificação), Faceta de Porcelana (com protocolo de cimentação), Coroa, Implante, Endodontia e Encaminhamento para especialistas."
              }
            },
            {
              "@type": "Question",
              "name": "Como funciona a gestão de pacientes?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Você pode cadastrar pacientes com informações de contato e notas clínicas. Cada paciente tem um histórico de avaliações e casos, com acompanhamento de progresso através de checklists interativos."
              }
            },
            {
              "@type": "Question",
              "name": "Posso exportar as recomendações?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Sim, todas as avaliações podem ser exportadas em PDF profissional com os dados do caso, fotos clínicas, análise DSD, protocolo completo e logo do seu consultório."
              }
            },
            {
              "@type": "Question",
              "name": "Quanto custa?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "O ToSmile.ai oferece um plano gratuito com créditos limitados para você experimentar. Para uso contínuo, temos planos pagos com mais créditos para análises e simulações DSD."
              }
            },
            {
              "@type": "Question",
              "name": "A ferramenta substitui meu julgamento clínico?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Não. O ToSmile.ai é uma ferramenta de apoio à decisão clínica. As recomendações são sugestões baseadas em evidências e devem ser validadas pelo profissional de acordo com cada caso específico."

            }
